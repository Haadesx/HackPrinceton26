name: BrainBrew
options:
  bundleIdPrefix: com.vareshpatel.brainbrew
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 3V45FASW3Q
    CODE_SIGN_STYLE: Automatic

targets:
  BrainBrew:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Syllara/Sources
        excludes:
          - "**/*.md"
      - path: Syllara/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vareshpatel.brainbrew.app
        INFOPLIST_FILE: Syllara/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: 3V45FASW3Q
        CODE_SIGN_STYLE: Automatic
    info:
      path: Syllara/Resources/Info.plist
      properties:
        CFBundleName: Brain Brew
        CFBundleDisplayName: Brain Brew
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        BrainBrewAPIBaseURL: "http://10.29.52.79:8000"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Brain Brew connects to your Mac on the local network to load courses, assignments, graph data, and AI features."
        NSMicrophoneUsageDescription: "Brain Brew uses the microphone to transcribe voice queries."
        NSSpeechRecognitionUsageDescription: "Brain Brew uses speech recognition to transcribe voice input directly on your device when available."
        NSDocumentsFolderUsageDescription: "Brain Brew reads transcript files you select."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
